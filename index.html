<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTONYM ATTACK: Arcade Edition</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-color: #111122;
            --border-color: #ffd700;
            --text-primary: #ffffff;
            --text-accent: #33ff33;
            --text-warn: #ff3333;
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --font-stack: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            padding: 10px;
        }

        #arcade-cabinet {
            width: 100%;
            max-width: 500px;
            height: 780px;
            background: var(--panel-color);
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(0, 255, 255, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            text-align: center;
            border-bottom: 3px dashed var(--neon-pink);
            padding-bottom: 15px;
            flex-shrink: 0;
        }

        h1.marquee {
            font-size: 2rem;
            color: var(--border-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px var(--neon-pink);
            margin-bottom: 10px;
        }

        .hud {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            background: #000;
            padding: 10px;
            border: 2px solid var(--neon-blue);
            border-radius: 4px;
        }

        .hud-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hud-label {
            font-size: 0.7rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .hud-val {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-accent);
        }

        #screen-manager {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-top: 15px;
        }

        .screen-view {
            display: none;
            width: 100%;
            height: 100%;
        }

        .screen-view.active {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        .abort-container {
            width: 100%;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .target-wrapper {
            text-align: center;
            margin-bottom: 15px;
            background: #050515;
            padding: 15px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            flex-shrink: 0;
        }

        .target-label {
            font-size: 0.8rem;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .target-word {
            font-size: 2.2rem;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--border-color);
        }

        .game-form {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        .options-list-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: auto;
            overflow-y: auto;
            padding-right: 2px;
        }

        .option-label {
            background: #000;
            border: 2px solid var(--neon-blue);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .option-label:hover,
        .option-label:focus-within {
            border-color: var(--border-color);
            background: #0a0a20;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
        }

        .option-label input[type="radio"] {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            outline: none;
            position: relative;
            flex-shrink: 0;
        }

        .option-label input[type="radio"]:checked::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 8px;
            height: 8px;
            background: var(--text-accent);
            border-radius: 50%;
        }

        .option-label input[type="radio"]:focus-visible {
            outline: 2px solid var(--border-color);
            outline-offset: 2px;
        }

        .btn {
            background: var(--border-color);
            color: #000;
            font-family: var(--font-stack);
            font-size: 1.1rem;
            font-weight: bold;
            padding: 12px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
            width: 100%;
            flex-shrink: 0;
        }

        .btn:hover,
        .btn:focus-visible {
            background: #ffea70;
            outline: 3px solid var(--text-primary);
        }

        .btn-abort {
            background: #220000;
            border: 2px solid var(--text-warn);
            color: var(--text-warn);
            padding: 10px 16px;
            font-size: 0.95rem;
        }

        .btn-abort:hover,
        .btn-abort:focus-visible {
            background: var(--text-warn);
            color: #000;
            outline: none;
        }

        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            border-radius: 8px;
        }

        .feedback-overlay.flash-correct {
            display: flex;
            background: rgba(0, 40, 0, 0.95);
            border: 4px solid var(--text-accent);
        }

        .feedback-overlay.flash-incorrect {
            display: flex;
            background: rgba(40, 0, 0, 0.95);
            border: 4px solid var(--text-warn);
        }

        .feedback-title {
            font-size: 2.2rem;
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .flash-correct .feedback-title {
            color: var(--text-accent);
        }

        .flash-incorrect .feedback-title {
            color: var(--text-warn);
        }

        .feedback-desc {
            font-size: 1.1rem;
            line-height: 1.5;
            max-width: 400px;
        }

        .board-title {
            color: var(--neon-pink);
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .leaderboard-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-shrink: 0;
        }

        .btn-nav {
            background: #000;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-stack);
            font-size: 0.9rem;
            font-weight: bold;
            padding: 8px;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 4px;
            flex: 1;
        }

        .btn-nav:hover:not(:disabled) {
            background: var(--neon-blue);
            color: #000;
        }

        .btn-nav:disabled {
            border-color: #333344;
            color: #555566;
            cursor: not-allowed;
        }

        .leaderboard-table-container {
            width: 100%;
            margin-bottom: auto;
            overflow-y: auto;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background: #000;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            border: 1px solid #222244;
            padding: 8px;
            font-size: 0.95rem;
            text-align: left;
        }

        .leaderboard-table th {
            color: var(--neon-blue);
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .leaderboard-table tr:nth-child(even) {
            background: #050510;
        }

        .arcade-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #050515;
            padding: 20px;
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            margin-bottom: auto;
        }

        .initials-input {
            background: #000;
            border: 2px solid var(--neon-pink);
            color: var(--text-accent);
            font-family: var(--font-stack);
            font-size: 2.2rem;
            text-transform: uppercase;
            text-align: center;
            width: 120px;
            letter-spacing: 6px;
            padding: 5px;
            border-radius: 4px;
        }

        .initials-input:focus {
            outline: none;
            border-color: var(--border-color);
            box-shadow: 0 0 10px var(--border-color);
        }

        .level-select-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: auto;
            overflow-y: auto;
            padding-right: 2px;
        }

        .btn-lvl {
            background: #0a0a20;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-stack);
            padding: 10px;
            font-size: 0.85rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
            width: 100%;
            flex-shrink: 0;
            text-align: left;
            padding-left: 15px;
            transition: all 0.2s ease;
            white-space: normal;
            line-height: 1.3;
        }

        .btn-lvl:hover:not(:disabled),
        .btn-lvl:focus-visible:not(:disabled) {
            background: var(--neon-blue);
            color: #000;
            outline: none;
        }

        .btn-lvl:disabled {
            background: #11111a;
            border-color: #333344;
            color: #555566;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>

<body>

    <div id="arcade-cabinet">
        <div id="aria-announcer" class="sr-only" aria-live="assertive"></div>

        <header>
            <h1 class="marquee">Antonym Attack</h1>
            <div class="hud">
                <div class="hud-card">
                    <span class="hud-label">Game Level</span>
                    <span id="hud-level" class="hud-val">1</span>
                </div>
                <div class="hud-card">
                    <span class="hud-label">Level Progress</span>
                    <span id="hud-progress" class="hud-val">0 / 25</span>
                </div>
                <div class="hud-card">
                    <span class="hud-label">Round Time</span>
                    <span id="hud-round-time" class="hud-val">0.0s</span>
                </div>
                <div class="hud-card">
                    <span class="hud-label">Level Time</span>
                    <span id="hud-stack-time" class="hud-val">0.0s</span>
                </div>
            </div>
        </header>

        <div id="feedback-panel" class="feedback-overlay" role="alert" aria-hidden="true">
            <h2 id="feedback-msg-title" class="feedback-title"></h2>
            <p id="feedback-msg-desc" class="feedback-desc"></p>
        </div>

        <main id="screen-manager">

            <section id="view-level-select" class="screen-view active">
                <h2 class="board-title">Select Level</h2>
                <div id="level-buttons-container" class="level-select-list" role="group" aria-label="Reading Levels">
                </div>
                <button class="btn" style="margin-top: 15px;" onclick="showGlobalLeaderboards()">View High
                    Scores</button>
            </section>

            <section id="view-arena" class="screen-view">
                <div class="abort-container">
                    <button type="button" class="btn btn-abort" onclick="abandonShip()">Abandon Ship!</button>
                </div>

                <div class="target-wrapper">
                    <div class="target-label">Find the Antonym</div>
                    <h2 id="current-target-word" class="target-word">---</h2>
                </div>

                <form id="arena-form" class="game-form" onsubmit="evaluateSubmission(event)">
                    <fieldset style="border:none; display:flex; flex-direction:column; flex-grow:1;">
                        <legend class="sr-only">Select the correct antonym choice below</legend>
                        <div id="options-box" class="options-list-container"></div>
                    </fieldset>
                    <button type="submit" class="btn">Fire Missile!</button>
                </form>
            </section>

            <section id="view-registry" class="screen-view">
                <h2 class="board-title" style="color: var(--text-accent);">Level Completed!</h2>
                <div class="arcade-input-container">
                    <p style="text-align: center; line-height: 1.4;">You cleared the level!<br>Enter your Initials for
                        the Leaderboard:</p>
                    <input type="text" id="player-initials" class="initials-input" maxlength="3" placeholder="AAA"
                        aria-label="Three character initials">
                    <button class="btn" style="margin-top: 15px;" onclick="commitRegistryScore()">Log Initials</button>
                </div>
            </section>

            <section id="view-leaderboard" class="screen-view">
                <h2 id="leaderboard-view-title" class="board-title">Leaderboard</h2>

                <div class="leaderboard-controls">
                    <button id="btn-prev-leaderboard" class="btn-nav" onclick="navigateLeaderboard(-1)">◀ Prev
                        Level</button>
                    <button id="btn-next-leaderboard" class="btn-nav" onclick="navigateLeaderboard(1)">Next Level
                        ▶</button>
                </div>

                <div class="leaderboard-table-container">
                    <table class="leaderboard-table">
                        <thead>
                            <tr>
                                <th scope="col">Rank</th>
                                <th scope="col">Initials</th>
                                <th scope="col">Time</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-rows"></tbody>
                    </table>
                </div>
                <button class="btn" style="margin-top: 15px;" onclick="exitToMainMenu()">Main Menu</button>
            </section>

        </main>
    </div>

    <script>

            ["Smart", 2, "Dumb", "Clever", "Bright", "Sharp", "Wise", "Intelligent"], ["Quick", 2, "Slow", "Rapid", "Swift", "Fleet", "Speedy", "Prompt"], ["Large", 2, "Small", "Huge", "Great", "Grand", "Vast", "Immense"], ["Bright", 2, "Dark", "Clear", "Radiant", "Luminous", "Glowing", "Brilliant"], ["Quiet", 2, "Loud", "Silent", "Still", "Calm", "Peaceful", "Serene"], ["Brave", 2, "Afraid", "Bold", "Fearless", "Courageous", "Valiant", "Intrepid"], ["Wrong", 2, "Right", "False", "Faulty", "Flawed", "Incorrect", "Untrue"], ["Early", 2, "Late", "Soon", "Timely", "Prompt", "Forward", "Advanced"], ["Sweet", 2, "Sour", "Sugary", "Honeyed", "Dulcet", "Pleasant", "Amiable"], ["Sharp", 2, "Dull", "Keen", "Acute", "Pointed", "Edged", "Piercing"], ["Smooth", 2, "Rough", "Even", "Level", "Flat", "Slick", "Polished"], ["Empty", 2, "Full", "Blank", "Bare", "Vacant", "Void", "Hollow"], ["Hard", 2, "Soft", "Firm", "Solid", "Rigid", "Tough", "Strong"], ["Weak", 2, "Strong", "Frail", "Faint", "Feeble", "Fragile", "Infirm"], ["Tame", 2, "Wild", "Gentle", "Mild", "Docile", "Meek", "Subdued"], ["Tight", 2, "Loose", "Firm", "Taut", "Secure", "Fast", "Snug"], ["Deep", 2, "Shallow", "Bottomless", "Profound", "Extreme", "Intense", "Abysmal"], ["Broad", 2, "Narrow", "Wide", "Vast", "Spacious", "Extensive", "Ample"], ["Cool", 2, "Warm", "Chilly", "Frigid", "Frosty", "Refreshing", "Algid"], ["Mad", 2, "Glad", "Angry", "Cross", "Furious", "Irate", "Incensed"], ["Safe", 2, "Danger", "Secure", "Guarded", "Shielded", "Protected", "Harmless"], ["Thick", 2, "Thin", "Dense", "Heavy", "Solid", "Pack-tight", "Compact"], ["Fair", 2, "Mean", "Just", "Equal", "Honest", "Direct", "Candid"], ["Kind", 2, "Cruel", "Gentle", "Mild", "Tender", "Benign", "Gracious"], ["Proud", 2, "Humble", "Grand", "Lofty", "Noble", "Lordly", "Arrogant"],
            ["Clever", 3, "Stupid", "Shrewd", "Astute", "Sharp", "Crafty", "Cunning"], ["Rapid", 3, "Sluggish", "Swift", "Fleet", "Speedy", "Prompt", "Quick"], ["Huge", 3, "Tiny", "Vast", "Immense", "Enormous", "Massive", "Gigantic"], ["Silent", 3, "Noisy", "Still", "Calm", "Peaceful", "Serene", "Placid"], ["Bold", 3, "Timid", "Fearless", "Courageous", "Valiant", "Intrepid", "Daring"], ["False", 3, "True", "Faulty", "Flawed", "Incorrect", "Untrue", "Erroneous"], ["Prompt", 3, "Tardy", "Early", "Timely", "Forward", "Advanced", "Punctual"], ["Gentle", 3, "Harsh", "Mild", "Docile", "Meek", "Subdued", "Placid"], ["Keen", 3, "Blunt", "Acute", "Pointed", "Edged", "Piercing", "Incisive"], ["Even", 3, "Rough", "Level", "Flat", "Slick", "Polished", "Uniform"], ["Vacant", 3, "Full", "Blank", "Bare", "Void", "Hollow", "Empty"], ["Firm", 3, "Flabby", "Solid", "Rigid", "Tough", "Strong", "Secure"], ["Frail", 3, "Robust", "Faint", "Feeble", "Fragile", "Infirm", "Delicate"], ["Taut", 3, "Slack", "Tight", "Secure", "Fast", "Snug", "Stretched"], ["Wide", 3, "Narrow", "Vast", "Spacious", "Extensive", "Ample", "Broad"], ["Chilly", 3, "Toasty", "Frigid", "Frosty", "Algid", "Bitter", "Biting"], ["Angry", 3, "Calm", "Cross", "Furious", "Irate", "Incensed", "Enraged"], ["Secure", 3, "Unsafe", "Guarded", "Shielded", "Protected", "Harmless", "Certain"], ["Dense", 3, "Sparse", "Heavy", "Solid", "Compact", "Thick", "Concentrated"], ["Just", 3, "Unfair", "Equal", "Honest", "Direct", "Candid", "Equitable"], ["Noble", 3, "Lowly", "Grand", "Lofty", "Lordly", "Arrogant", "Exalted"], ["Grand", 3, "Humble", "Lofty", "Lordly", "Arrogant", "Exalted", "Majestic"], ["Vast", 3, "Small", "Immense", "Enormous", "Massive", "Gigantic", "Colossal"], ["Harsh", 3, "Mild", "Severe", "Stern", "Strict", "Rigid", "Austere"], ["Grave", 3, "Silly", "Serious", "Solemn", "Earnest", "Somber", "Severe"]
        ];

        const LEVEL_INVITATIONS = {
            1: "See a big word.",
            2: "Spot simple words quickly.",
            3: "Challenge your mind here.",
            4: "Embark on an interactive journey.",
            5: "Prepare to encounter more advanced terms.",
            6: "Outsmart the systemic countdown with swift responses.",
            7: "Pinpoint precise linguistic contrasts to maintain your high score momentum.",
            8: "Analyze these multifaceted vocabulary items with structural precision.",
            9: "Evaluate subtle definitions to systematically dismantle opposing obstacles.",
            10: "Exhibiting profound cognitive agility enables participants to navigate these intricate layers.",
            11: "Incorporate advanced conceptual parsing methodologies to accurately decipher these highly specialized pairings.",
            12: "Achieve absolute configuration dominance through unparalleled cognitive optimization."
        };

        const SYSTEM_DEFAULT_BENCHMARKS = [
            { initials: "AAA", time: 48.2 }, { initials: "ACE", time: 55.4 },
            { initials: "BOB", time: 61.0 }, { initials: "POO", time: 66.8 },
            { initials: "CPU", time: 72.3 }, { initials: "OCD", time: 78.5 },
            { initials: "MAX", time: 84.1 }, { initials: "FLY", time: 90.4 },
            { initials: "BOT", time: 99.2 }, { initials: "ZAP", time: 112.5 }
        ];

        let currentLevel = 1;
        let runningLevelDeck = [];
        let completedLevelCount = 0;
        let activeWordItem = null;

        let roundTimerInterval = null;
        let levelTimerInterval = null;
        let roundTimeElapsed = 0.0;
        let levelTimeElapsed = 0.0;

        let viewedLeaderboardLevel = 1;

        function getHighestUnlockedLevel() {
            return parseInt(localStorage.getItem('antonym_arcade_unlocked_level')) || 1;
        }

        function setHighestUnlockedLevel(lvl) {
            localStorage.setItem('antonym_arcade_unlocked_level', lvl);
        }

        function buildLevelSelectionInterface() {
            const container = document.getElementById('level-buttons-container');
            container.innerHTML = '';
            const unlockedLevel = getHighestUnlockedLevel();

            for (let i = 1; i <= 12; i++) {
                const btn = document.createElement('button');
                btn.className = 'btn-lvl';

                const invitationText = LEVEL_INVITATIONS[i] || "";
                btn.innerHTML = `<strong>LEVEL ${i}</strong><br><small>${invitationText}</small>`;
                btn.style.textAlign = 'center';

                if (i <= unlockedLevel) {
                    btn.onclick = () => initiateLevel(i);
                } else {
                    btn.disabled = true;
                }
                container.appendChild(btn);
            }
        }

        function seedLeaderboardsIfEmpty() {
            for (let l = 1; l <= 12; l++) {
                if (!localStorage.getItem(`antonym_arcade_lvl_${l}`)) {
                    localStorage.setItem(`antonym_arcade_lvl_${l}`, JSON.stringify(SYSTEM_DEFAULT_BENCHMARKS));
                }
            }
        }

        function switchView(viewId) {
            document.querySelectorAll('.screen-view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(viewId).classList.add('active');
        }

        function announceToScreenReader(message) {
            const announcer = document.getElementById('aria-announcer');
            announcer.textContent = message;
        }

        function shuffleFisherYates(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function startRoundTimer() {
            clearInterval(roundTimerInterval);
            roundTimerInterval = setInterval(() => {
                roundTimeElapsed += 0.1;
                document.getElementById('hud-round-time').textContent = roundTimeElapsed.toFixed(1) + 's';
            }, 100);
        }

        function stopRoundTimer() {
            clearInterval(roundTimerInterval);
        }

        function startLevelTimer() {
            clearInterval(levelTimerInterval);
            levelTimerInterval = setInterval(() => {
                levelTimeElapsed += 0.1;
                document.getElementById('hud-stack-time').textContent = levelTimeElapsed.toFixed(1) + 's';
            }, 100);
        }

        function stopLevelTimer() {
            clearInterval(levelTimerInterval);
        }

        function initiateLevel(levelNum) {
            currentLevel = levelNum;
            completedLevelCount = 0;
            levelTimeElapsed = 0.0;

            runningLevelDeck = VOCABULARY_DATASET.filter(row => row[1] === levelNum);

            if (runningLevelDeck.length === 0) {
                runningLevelDeck = VOCABULARY_DATASET.filter(row => row[1] === 1);
            }

            shuffleFisherYates(runningLevelDeck);

            document.getElementById('hud-level').textContent = currentLevel;
            document.getElementById('hud-progress').textContent = `0 / ${runningLevelDeck.length}`;
            document.getElementById('hud-stack-time').textContent = "0.0s";

            switchView('view-arena');
            announceToScreenReader(`Level ${currentLevel} initiated. Game started.`);

            startLevelTimer();
            serveNextWord();
        }

        function serveNextWord() {
            if (runningLevelDeck.length === 0) {
                concludeLevel();
                return;
            }

            activeWordItem = runningLevelDeck.shift();
            roundTimeElapsed = 0.0;
            document.getElementById('hud-round-time').textContent = "0.0s";

            document.getElementById('current-target-word').textContent = activeWordItem[0];

            const choices = [];
            choices.push({ text: activeWordItem[2], isCorrect: true });
            for (let i = 3; i < activeWordItem.length; i++) {
                choices.push({ text: activeWordItem[i], isCorrect: false });
            }

            shuffleFisherYates(choices);

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';

            choices.forEach((choice, index) => {
                const uniqueId = `opt-${index}`;
                const label = document.createElement('label');
                label.className = 'option-label';
                label.setAttribute('for', uniqueId);

                label.innerHTML = `
                    <input type="radio" name="antonym-choice" id="${uniqueId}" value="${choice.text}" data-correct="${choice.isCorrect}">
                    <span>${choice.text}</span>
                `;
                optionsBox.appendChild(label);
            });

            startRoundTimer();
            announceToScreenReader(`Target word is ${activeWordItem[0]}. Select your choice.`);
        }

        function evaluateSubmission(event) {
            event.preventDefault();
            stopRoundTimer();

            const selected = document.querySelector('input[name="antonym-choice"]:checked');
            if (!selected) {
                alert("Please select an answer option before firing.");
                startRoundTimer();
                return;
            }

            const isCorrect = selected.getAttribute('data-correct') === 'true';
            const feedbackPanel = document.getElementById('feedback-panel');
            const fTitle = document.getElementById('feedback-msg-title');
            const fDesc = document.getElementById('feedback-msg-desc');

            feedbackPanel.setAttribute('aria-hidden', 'false');

            if (isCorrect) {
                completedLevelCount++;
                document.getElementById('hud-progress').textContent = `${completedLevelCount} / ${completedLevelCount + runningLevelDeck.length}`;

                fTitle.textContent = "SUCCESS!";
                fDesc.textContent = `Target cleared in ${roundTimeElapsed.toFixed(1)}s.`;
                feedbackPanel.className = "feedback-overlay flash-correct";

                announceToScreenReader("Correct answer selection.");

                setTimeout(() => {
                    feedbackPanel.className = "feedback-overlay";
                    feedbackPanel.setAttribute('aria-hidden', 'true');
                    serveNextWord();
                }, 1200);

            } else {
                runningLevelDeck.push(activeWordItem);
                document.getElementById('hud-progress').textContent = `${completedLevelCount} / ${completedLevelCount + runningLevelDeck.length}`;

                fTitle.textContent = "MISSED!";
                fDesc.textContent = `Incorrect tracking. Correct answer was: ${activeWordItem[2]}. Recycling targets.`;
                feedbackPanel.className = "feedback-overlay flash-incorrect";

                announceToScreenReader(`Incorrect. The correct answer was ${activeWordItem[2]}. Word recycled.`);

                setTimeout(() => {
                    feedbackPanel.className = "feedback-overlay";
                    feedbackPanel.setAttribute('aria-hidden', 'true');
                    serveNextWord();
                }, 2500);
            }
        }

        function abandonShip() {
            stopRoundTimer();
            stopLevelTimer();

            runningLevelDeck = [];
            activeWordItem = null;
            completedLevelCount = 0;

            document.getElementById('hud-level').textContent = "1";
            document.getElementById('hud-progress').textContent = "0 / 25";
            document.getElementById('hud-round-time').textContent = "0.0s";
            document.getElementById('hud-stack-time').textContent = "0.0s";

            buildLevelSelectionInterface();
            switchView('view-level-select');
            announceToScreenReader("Level deployment aborted. Returned to main menu.");
        }

        function concludeLevel() {
            stopLevelTimer();

            const nextLevelCandidate = currentLevel + 1;
            if (nextLevelCandidate <= 12 && nextLevelCandidate > getHighestUnlockedLevel()) {
                setHighestUnlockedLevel(nextLevelCandidate);
            }

            switchView('view-registry');
            announceToScreenReader(`Level clear complete. Total time elapsed was ${levelTimeElapsed.toFixed(1)} seconds. Enter details.`);
        }

        function commitRegistryScore() {
            const inputEl = document.getElementById('player-initials');
            let initials = inputEl.value.trim().toUpperCase();

            if (!initials) initials = "AAA";
            if (initials.length > 3) initials = initials.substring(0, 3);

            const records = JSON.parse(localStorage.getItem(`antonym_arcade_lvl_${currentLevel}`)) || [];
            records.push({ initials: initials, time: parseFloat(levelTimeElapsed.toFixed(1)) });
            records.sort((a, b) => a.time - b.time);

            if (records.length > 10) records.pop();

            localStorage.setItem(`antonym_arcade_lvl_${currentLevel}`, JSON.stringify(records));

            inputEl.value = "";
            renderLeaderboardScreen(currentLevel);
        }

        function renderLeaderboardScreen(level) {
            viewedLeaderboardLevel = level;
            const highestUnlocked = getHighestUnlockedLevel();

            const titleEl = document.getElementById('leaderboard-view-title');
            titleEl.textContent = `HIGH SCORES: LEVEL ${level}`;

            document.getElementById('btn-prev-leaderboard').disabled = (level <= 1);
            document.getElementById('btn-next-leaderboard').disabled = (level >= highestUnlocked);

            const records = JSON.parse(localStorage.getItem(`antonym_arcade_lvl_${level}`)) || [];
            const tbody = document.getElementById('leaderboard-rows');
            tbody.innerHTML = '';

            records.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td><strong>${row.initials}</strong></td>
                    <td>${row.time.toFixed(1)}s</td>
                `;
                tbody.appendChild(tr);
            });

            switchView('view-leaderboard');
        }

        function navigateLeaderboard(direction) {
            const destinationLevel = viewedLeaderboardLevel + direction;
            const highestUnlocked = getHighestUnlockedLevel();

            if (destinationLevel >= 1 && destinationLevel <= highestUnlocked) {
                renderLeaderboardScreen(destinationLevel);
            }
        }

        function showGlobalLeaderboards() {
            const targetScoreViewLevel = getHighestUnlockedLevel();
            renderLeaderboardScreen(targetScoreViewLevel);
        }

        function exitToMainMenu() {
            buildLevelSelectionInterface();
            switchView('view-level-select');
            announceToScreenReader("Returned to main menu.");
        }

        window.addEventListener('DOMContentLoaded', () => {
            seedLeaderboardsIfEmpty();
            buildLevelSelectionInterface();
        });
    </script>
</body>

</html>
