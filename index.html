<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANTONYM ATTACK: Arcade Edition</title>
    <style>
        :root {
            --bg-color: #000000;
            --panel-color: #111122;
            --border-color: #ffd700;
            --text-primary: #ffffff;
            --text-accent: #33ff33;
            --text-warn: #ff3333;
            --neon-blue: #00ffff;
            --neon-pink: #ff00ff;
            --font-stack: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 10px;
        }

        #arcade-cabinet {
            width: 100%;
            max-width: 800px;
            background: var(--panel-color);
            border: 4px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3), inset 0 0 15px rgba(0, 255, 255, 0.2);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        header {
            text-align: center;
            border-bottom: 3px dashed var(--neon-pink);
            padding-bottom: 15px;
        }

        h1.marquee {
            font-size: 2.2rem;
            color: var(--border-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px var(--neon-pink);
            margin-bottom: 10px;
        }

        .hud {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            background: #000;
            padding: 10px;
            border: 2px solid var(--neon-blue);
            border-radius: 4px;
        }

        @media (min-width: 600px) {
            .hud {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .hud-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hud-label {
            font-size: 0.75rem;
            color: var(--neon-blue);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .hud-val {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--text-accent);
        }

        main {
            min-height: 340px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .screen-view {
            display: none;
            width: 100%;
        }

        .screen-view.active {
            display: block;
        }

        .target-wrapper {
            text-align: center;
            margin-bottom: 25px;
            background: #050515;
            padding: 20px;
            border: 2px solid var(--border-color);
            border-radius: 8px;
        }

        .target-label {
            font-size: 0.9rem;
            color: var(--neon-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .target-word {
            font-size: 3rem;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--border-color);
        }

        .game-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .option-label {
            background: #000;
            border: 2px solid var(--neon-blue);
            border-radius: 6px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .option-label:hover,
        .option-label:focus-within {
            border-color: var(--border-color);
            background: #0a0a20;
            box-shadow: 0 0 8px rgba(255, 215, 0, 0.4);
        }

        .option-label input[type="radio"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid var(--neon-pink);
            border-radius: 50%;
            outline: none;
            position: relative;
        }

        .option-label input[type="radio"]:checked::before {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 8px;
            height: 8px;
            background: var(--text-accent);
            border-radius: 50%;
        }

        .option-label input[type="radio"]:focus-visible {
            outline: 2px solid var(--border-color);
            outline-offset: 3px;
        }

        .btn {
            background: var(--border-color);
            color: #000;
            font-family: var(--font-stack);
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.2s;
            width: 100%;
        }

        .btn:hover,
        .btn:focus-visible {
            background: #ffea70;
            outline: 3px solid var(--text-primary);
        }

        /* Flash Feedback Layout */
        .feedback-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            border-radius: 8px;
        }

        .feedback-overlay.flash-correct {
            display: flex;
            background: rgba(0, 40, 0, 0.95);
            border: 4px solid var(--text-accent);
        }

        .feedback-overlay.flash-incorrect {
            display: flex;
            background: rgba(40, 0, 0, 0.95);
            border: 4px solid var(--text-warn);
        }

        .feedback-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .flash-correct .feedback-title {
            color: var(--text-accent);
        }

        .flash-incorrect .feedback-title {
            color: var(--text-warn);
        }

        .feedback-desc {
            font-size: 1.2rem;
            line-height: 1.6;
            max-width: 500px;
        }

        /* Leaderboard and Screens */
        .board-title {
            color: var(--neon-pink);
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background: #000;
            margin-bottom: 20px;
        }

        .leaderboard-table th,
        .leaderboard-table td {
            border: 1px solid #222244;
            padding: 10px;
            text-align: left;
        }

        .leaderboard-table th {
            color: var(--neon-blue);
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        .leaderboard-table tr:nth-child(even) {
            background: #050510;
        }

        .arcade-input-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: #050515;
            padding: 20px;
            border: 2px dashed var(--border-color);
            border-radius: 6px;
        }

        .initials-input {
            background: #000;
            border: 2px solid var(--neon-pink);
            color: var(--text-accent);
            font-family: var(--font-stack);
            font-size: 2.5rem;
            text-transform: uppercase;
            text-align: center;
            width: 120px;
            letter-spacing: 6px;
            padding: 5px;
            border-radius: 4px;
        }

        .initials-input:focus {
            outline: none;
            border-color: var(--border-color);
            box-shadow: 0 0 10px var(--border-color);
        }

        .level-select-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        @media (min-width: 600px) {
            .level-select-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .btn-lvl {
            background: #0a0a20;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: var(--font-stack);
            padding: 12px;
            font-size: 1rem;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
        }

        .btn-lvl:hover,
        .btn-lvl:focus-visible {
            background: var(--neon-blue);
            color: #000;
            outline: none;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>

<body>

    <div id="arcade-cabinet">
        <div id="aria-announcer" class="sr-only" aria-live="assertive"></div>

        <header>
            <h1 class="marquee">Antonym Attack</h1>
            <div class="hud">
                <div class="hud-card">
                    <span class="hud-label">Level Stack</span>
                    <span id="hud-level" class="hud-val">1</span>
                </div>
                <div class="hud-card">
                    <span class="hud-label">Stack Progress</span>
                    <span id="hud-progress" class="hud-val">0 / 25</span>
                </div>
                <div class="hud-card">
                    <span class="hud-label">Round Time</span>
                    <span id="hud-round-time" class="hud-val">0.0s</span>
                </div>
                <div class="hud-card">
                    <span class="hud-label">Stack Time</span>
                    <span id="hud-stack-time" class="hud-val">0.0s</span>
                </div>
            </div>
        </header>

        <div id="feedback-panel" class="feedback-overlay" role="alert" aria-hidden="true">
            <h2 id="feedback-msg-title" class="feedback-title"></h2>
            <p id="feedback-msg-desc" class="feedback-desc"></p>
        </div>

        <main id="screen-manager">

            <section id="view-level-select" class="screen-view active">
                <h2 class="board-title">Select Insertion Level</h2>
                <div class="level-select-grid" role="group" aria-label="Reading Levels">
                    <script>
                        for (let i = 1; i <= 12; i++) {
                            document.write(`<button class="btn-lvl" onclick="initiateLevel(${i})">LVL ${i}</button>`);
                        }
                    </script>
                </div>
                <button class="btn" onclick="showGlobalLeaderboards()">View High Scores</button>
            </section>

            <section id="view-arena" class="screen-view">
                <div class="target-wrapper">
                    <div class="target-label">Find the Antonym</div>
                    <h2 id="current-target-word" class="target-word">---</h2>
                </div>

                <form id="arena-form" class="game-form" onsubmit="evaluateSubmission(event)">
                    <fieldset style="border:none;">
                        <legend class="sr-only">Select the correct antonym choice below</legend>
                        <div id="options-box" class="options-grid">
                        </div>
                    </fieldset>
                    <button type="submit" class="btn" style="margin-top: 10px;">Fire Missile (Submit)</button>
                </form>
            </section>

            <section id="view-registry" class="screen-view">
                <h2 class="board-title" style="color: var(--text-accent);">Level Completed!</h2>
                <div class="arcade-input-container">
                    <p style="text-align: center; line-height: 1.4;">You cleared the stack!<br>Enter your Initials for
                        the Leaderboard:</p>
                    <input type="text" id="player-initials" class="initials-input" maxlength="3" placeholder="AAA"
                        aria-label="Three character initials">
                    <button class="btn" onclick="commitRegistryScore()">Log Initials</button>
                </div>
            </section>

            <section id="view-leaderboard" class="screen-view">
                <h2 id="leaderboard-view-title" class="board-title">Leaderboard</h2>
                <table class="leaderboard-table">
                    <thead>
                        <tr>
                            <th scope="col">Rank</th>
                            <th scope="col">Initials</th>
                            <th scope="col">Time</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-rows">
                    </tbody>
                </table>
                <button class="btn" onclick="exitToMainMenu()">Main Menu</button>
            </section>

        </main>
    </div>

        // Seed Default Highscore lists inside engine initialization stage
        function seedLeaderboardsIfEmpty() {
            for (let l = 1; l <= 12; l++) {
                if (!localStorage.getItem(`antonym_arcade_lvl_${l}`)) {
                    let randomizedList = SYSTEM_DEFAULT_BENCHMARKS.map(item => ({
                        initials: item.initials,
                        time: parseFloat((item.time + (Math.random() * 8.5)).toFixed(1))
                    }));
                    randomizedList.sort((a, b) => a.time - b.time);
                    localStorage.setItem(`antonym_arcade_lvl_${l}`, JSON.stringify(randomizedList));
                }
            }
        }

        function switchView(targetViewId) {
            document.querySelectorAll('.screen-view').forEach(view => {
                view.classList.remove('active');
            });
            document.getElementById(targetViewId).classList.add('active');
        }

        function announceToScreenReader(text) {
            document.getElementById('aria-announcer').textContent = text;

        // Engine Level Initialization Routine
        function initiateLevel(levelNumber) {
            currentLevel = levelNumber;
            document.getElementById('hud-level').textContent = currentLevel;

            // Build stack allocations filtered by parsing selected level profile
            let levelWords = VOCABULARY_DATASET.filter(row => row[1] === currentLevel);

            // Map records structurally to game architecture configurations
            currentStack = levelWords.map(row => ({
                word: row[0],
                antonym: row[2],
                synonyms: [row[3], row[4], row[5], row[6], row[7]]
            }));

            // Shuffle array inputs natively
            currentStack.sort(() => Math.random() - 0.5);

            completedInStackCount = 0;
            totalInStackCount = currentStack.length;
            elapsedStackSeconds = 0.0;

            document.getElementById('hud-progress').textContent = `${completedInStackCount} / ${totalInStackCount}`;
            document.getElementById('hud-stack-time').textContent = `0.0s`;

            // Reset and trigger stack clocks
            clearInterval(stackTimerInterval);
            stackTimerInterval = setInterval(() => {
                elapsedStackSeconds += 0.1;
                document.getElementById('hud-stack-time').textContent = elapsedStackSeconds.toFixed(1) + 's';
            }, 100);

            switchView('view-arena');
            nextRound();
            announceToScreenReader(`Level ${currentLevel} started. Stack loaded with ${totalInStackCount} words.`);
        }

        // Advance to subsequent word loop
        function nextRound() {
            if (currentStack.length === 0) {
                concludeLevelStack();
                return;
            }

            currentActiveWordObj = currentStack.shift();
            document.getElementById('current-target-word').textContent = currentActiveWordObj.word;

            // Construct mixed configuration of choices (1 Antonym + 5 Distractors)
            let choices = [
                { text: currentActiveWordObj.antonym, isCorrect: true },
                ...currentActiveWordObj.synonyms.map(s => ({ text: s, isCorrect: false }))
            ];

            // Randomize position order cleanly
            choices.sort(() => Math.random() - 0.5);

            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';

            choices.forEach((choice, idx) => {
                const uniqueId = `opt-${idx}`;
                const label = document.createElement('label');
                label.className = 'option-label';
                label.setAttribute('for', uniqueId);

                const radio = document.createElement('input');
                radio.type = 'radio';
                radio.name = 'antonym-selection';
                radio.id = uniqueId;
                radio.value = choice.text;
                radio.dataset.correct = choice.isCorrect;
                radio.required = true;

                if (idx === 0) {
                    radio.autofocus = true;
                }

                const txtNode = document.createTextNode(choice.text);

                label.appendChild(radio);
                label.appendChild(txtNode);
                optionsBox.appendChild(label);
            });

            // Initialize word level execution timers
            elapsedRoundSeconds = 0.0;
            document.getElementById('hud-round-time').textContent = `0.0s`;
            clearInterval(roundTimerInterval);
            roundTimerInterval = setInterval(() => {
                elapsedRoundSeconds += 0.1;
                document.getElementById('hud-round-time').textContent = elapsedRoundSeconds.toFixed(1) + 's';
            }, 100);
        }

        // Evaluate submitted user inputs
        function evaluateSubmission(event) {
            event.preventDefault();
            clearInterval(roundTimerInterval);

            const selectedInput = document.querySelector('input[name="antonym-selection"]:checked');
            if (!selectedInput) return;

            const isCorrect = selectedInput.dataset.correct === "true";
            const chosenText = selectedInput.value;
            const feedbackPanel = document.getElementById('feedback-panel');
            const titleEl = document.getElementById('feedback-msg-title');
            const descEl = document.getElementById('feedback-msg-desc');

            feedbackPanel.removeAttribute('aria-hidden');

            if (isCorrect) {
                completedInStackCount++;
                document.getElementById('hud-progress').textContent = `${completedInStackCount} / ${totalInStackCount}`;

                feedbackPanel.className = "feedback-overlay flash-correct";
                titleEl.textContent = "SUCCESS";
                descEl.textContent = `Correct! "${chosenText}" is the antonym.`;
                announceToScreenReader(`Correct! ${chosenText} is the antonym.`);

                setTimeout(() => {
                    feedbackPanel.className = "feedback-overlay";
                    feedbackPanel.setAttribute('aria-hidden', 'true');
                    nextRound();
                }, 1100);

            } else {
                // Reinsert problem sequence item to bottom of stack matrix on fail state
                currentStack.push(currentActiveWordObj);

                feedbackPanel.className = "feedback-overlay flash-incorrect";
                titleEl.textContent = "MISSED";
                descEl.textContent = `You selected "${chosenText}". Correct Antonym was: "${currentActiveWordObj.antonym}". Word returned to back of stack.`;
                announceToScreenReader(`Incorrect. You selected ${chosenText}. The correct antonym was ${currentActiveWordObj.antonym}. Word pushed to end of stack.`);

                setTimeout(() => {
                    feedbackPanel.className = "feedback-overlay";
                    feedbackPanel.setAttribute('aria-hidden', 'true');
                    nextRound();
                }, 2800);
            }
        }

        // Halting criteria state transition
        function concludeLevelStack() {
            clearInterval(roundTimerInterval);
            clearInterval(stackTimerInterval);
            announceToScreenReader(`Stack cleared! Total time elapsed: ${elapsedStackSeconds.toFixed(1)} seconds. Entering score registry.`);
            switchView('view-registry');
            document.getElementById('player-initials').focus();
        }

        // Record initialization metrics inside storage systems
        function commitRegistryScore() {
            const inputEl = document.getElementById('player-initials');
            let initials = inputEl.value.trim().toUpperCase();

            if (initials.length === 0) {
                initials = "AAA";
            }

            let records = JSON.parse(localStorage.getItem(`antonym_arcade_lvl_${currentLevel}`)) || [];
            records.push({
                initials: initials,
                time: parseFloat(elapsedStackSeconds.toFixed(1))
            });

            // Sort ascending by lowest execution time
            records.sort((a, b) => a.time - b.time);

            // Limit to top 10 arcade tracks
            records = records.slice(0, 10);
            localStorage.setItem(`antonym_arcade_lvl_${currentLevel}`, JSON.stringify(records));

            inputEl.value = "";
            renderLeaderboardScreen(currentLevel);
        }

        // Output scores visually via tabular elements
        function renderLeaderboardScreen(level) {
            const titleEl = document.getElementById('leaderboard-view-title');
            titleEl.textContent = `HIGH SCORES: LEVEL ${level}`;

            const records = JSON.parse(localStorage.getItem(`antonym_arcade_lvl_${level}`)) || [];
            const tbody = document.getElementById('leaderboard-rows');
            tbody.innerHTML = '';

            records.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td><strong>${row.initials}</strong></td>
                    <td>${row.time.toFixed(1)}s</td>
                `;
                tbody.appendChild(tr);
            });

            switchView('view-leaderboard');
        }

        function showGlobalLeaderboards() {
            renderLeaderboardScreen(currentLevel);
        }

        function exitToMainMenu() {
            switchView('view-level-select');
            announceToScreenReader("Returned to main menu.");
        }

        // Initialization hook
        window.addEventListener('DOMContentLoaded', () => {
            seedLeaderboardsIfEmpty();
        });
    </script>
</body>

</html>
